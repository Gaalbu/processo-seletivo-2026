spring:
  application:
    name: lapes-commerce-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/lapes_commerce}
    username: ${SPRING_DATASOURCE_USERNAME:lapes}
    password: ${SPRING_DATASOURCE_PASSWORD:lapes}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      repositories:
        enabled: false
  cache:
    type: redis
    redis:
      time-to-live: 300s
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

server:
  port: 8080

app:
  jwt:
    secret: ${APP_JWT_SECRET:dev-secret-change-me-dev-secret-change-me-dev-secret-change-me}
    expiration-minutes: ${APP_JWT_EXPIRATION_MINUTES:120}
  rate-limit:
    enabled: ${APP_RATE_LIMIT_ENABLED:true}
    auth:
      capacity: ${APP_RATE_LIMIT_AUTH_CAPACITY:10}
      refill-window-seconds: ${APP_RATE_LIMIT_AUTH_REFILL_WINDOW_SECONDS:60}
    catalog:
      capacity: ${APP_RATE_LIMIT_CATALOG_CAPACITY:60}
      refill-window-seconds: ${APP_RATE_LIMIT_CATALOG_REFILL_WINDOW_SECONDS:60}
  payment:
    notification-url: ${APP_PAYMENT_NOTIFICATION_URL:http://localhost:8080/api/payments/mercado-pago/webhook}
    success-url: ${APP_PAYMENT_SUCCESS_URL:http://localhost:3000/orders}
    failure-url: ${APP_PAYMENT_FAILURE_URL:http://localhost:3000/orders}
    pending-url: ${APP_PAYMENT_PENDING_URL:http://localhost:3000/orders}
    webhook-secret: ${APP_PAYMENT_WEBHOOK_SECRET:}
    mercado-pago:
      access-token: ${APP_PAYMENT_MERCADO_PAGO_ACCESS_TOKEN:}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
