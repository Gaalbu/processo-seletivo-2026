spring:
  datasource:
    url: jdbc:h2:mem:lapes_commerce_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
  data:
    redis:
      repositories:
        enabled: false
  cache:
    type: simple
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

app:
  cors:
    allowed-origins: http://localhost,http://localhost:3000
  jwt:
    secret: test-secret-change-me-test-secret-change-me-test-secret-change-me
    expiration-minutes: 120
  rate-limit:
    enabled: false
    auth:
      capacity: 10
      refill-window-seconds: 60
    catalog:
      capacity: 60
      refill-window-seconds: 60
