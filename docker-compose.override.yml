services:
  backend:
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      APP_CORS_ALLOWED_ORIGINS: http://localhost,http://localhost:3000,http://localhost:5173
      JAVA_TOOL_OPTIONS: -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005

  postgres:
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    ports:
      - "127.0.0.1:6379:6379"
