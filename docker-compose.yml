services:
  postgres:
    image: postgres:16-alpine
    container_name: lapes-commerce-postgres
    environment:
      POSTGRES_DB: lapes_commerce
      POSTGRES_USER: lapes
      POSTGRES_PASSWORD: lapes
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lapes -d lapes_commerce"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lapes-commerce-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
